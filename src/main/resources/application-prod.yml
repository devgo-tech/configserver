
spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/devgo-tech/config-server-properties.git
          refresh-rate: 1
  zipkin:
    base-url: http://zipkin:9411

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://eurekaserver:8761/eureka/
  instance:
    hostname: configserver #docker service name
    instance-id: ${spring.application.name}:${random.value}


logging:
  level:
    org:
      springframework: DEBUG

zipkin:
  baseUrl: http://zipkin:9411

server:
  port: 8888

management:
  endpoints:
    web:
      exposure:
        include: refresh






